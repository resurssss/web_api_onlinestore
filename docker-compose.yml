services:
  app1:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: online_store_app1
    expose:
      - "80"
    environment:
      ASPNETCORE_URLS: http://+:80
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=onlinestore;Username=postgres;Password=postgres
      INSTANCE_ID: "Instance-1"
    depends_on:
      - db
    volumes:
      - ./server/OnlineStore.API/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - internal

  app2:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: online_store_app2
    expose:
      - "80"
    environment:
      ASPNETCORE_URLS: http://+:80
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=onlinestore;Username=postgres;Password=postgres
      INSTANCE_ID: "Instance-2"
    depends_on:
      - db
    volumes:
      - ./server/OnlineStore.API/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - internal

  app3:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: online_store_app3
    expose:
      - "80"
    environment:
      ASPNETCORE_URLS: http://+:80
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=onlinestore;Username=postgres;Password=postgres
      INSTANCE_ID: "Instance-3"
    depends_on:
      - db
    volumes:
      - ./server/OnlineStore.API/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - internal

  db:
    image: postgres:16
    container_name: online_store_db
    environment:
      POSTGRES_DB: onlinestore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: online_store_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
      - ./static:/usr/share/nginx/html/static
    depends_on:
      - app1
      - app2
      - app3
    restart: unless-stopped
    networks:
      - internal

  prometheus:
    image: prom/prometheus:latest
    container_name: online_store_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - internal
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: online_store_loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - internal
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: online_store_promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - internal
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: online_store_grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  loki_data:
  grafana_data: