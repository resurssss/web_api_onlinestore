name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: lyuberof
  DOCKER_IMAGE_NAME: onlinestore-api

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore ./server/OnlineStore.API/OnlineStore.API.csproj
      - name: Build
        run: dotnet build ./server/OnlineStore.API/OnlineStore.API.csproj --configuration Release
      - name: Test
        run: dotnet test ./OnlineStore.Tests/OnlineStore.Tests.csproj --configuration Release --no-build

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}

  deploy:
    needs: docker-build-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest images
        run: |
          cd C:\Users\Serg\store1
          docker-compose pull
      - name: Recreate containers with new image
        run: |
          cd C:\Users\Serg\store1
          docker-compose up -d --force-recreate
      - name: Verify deployment
        run: |
          timeout /t 15 /nobreak >nul
          curl -f http://localhost/health
      - name: Clean up old images
        run: docker image prune -f