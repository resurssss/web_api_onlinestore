# Upstream блок с тремя серверами
upstream backend_instances {
    # round-robin по умолчанию
    server app1:80;
    server app2:80;
    server app3:80;
    
    # keepalive для лучшей производительности
    keepalive 32;
}

# HTTP блок - перенаправление на HTTPS
server {
    listen 80;
    server_name localhost;
    
    # Перенаправляем все HTTP запросы на HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS блок - основная конфигурация
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost;
    
    # SSL сертификаты
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    
    # Настройки SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Логи
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    
    # Раздача статических файлов
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Проксирование всех остальных запросов на backend
    location / {
        proxy_pass http://backend_instances;

        proxy_intercept_errors on;
        error_page 500 501 502 503 504 =302 https://httpcats.com/500;
        
        # Прокси-заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Добавляем заголовок с информацией о том, какой инстанс обработал запрос
        add_header X-Upstream-Server $upstream_addr always;
        
        # HTTP/1.1 для keepalive
        proxy_http_version 1.1;
        
        # Таймауты
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}